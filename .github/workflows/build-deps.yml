name: Build Dependencies

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Sysroot release tag to create/update'
        default: 'sysroot-v2'

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            os: linux

          - target: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux

          - target: macos-x86_64
            runner: macos-14
            os: macos
            macos_target: x86_64-apple-macos10.14

          - target: macos-arm64
            runner: macos-14
            os: macos

          - target: windows-x86_64
            runner: ubuntu-24.04
            os: windows
            cross: x86_64-w64-mingw32

          - target: windows-arm64
            runner: ubuntu-24.04
            os: windows
            cross: aarch64-w64-mingw32
            llvm_mingw: true

    steps:
      - name: Checkout (for libass submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config cmake meson ninja-build autoconf automake libtool

      - name: Install macOS dependencies
        if: matrix.os == 'macos'
        run: |
          brew install pkg-config nasm ninja meson autoconf automake libtool coreutils

      - name: Install llvm-mingw
        if: matrix.llvm_mingw
        run: |
          URL=$(curl -fsSL https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data['assets']:
              n = a['name']
              if n.endswith('.tar.xz') and 'ucrt' in n and 'x86_64.tar.xz' in n and 'ubuntu' in n:
                  print(a['browser_download_url'])
                  break
          ")
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o llvm-mingw.tar.xz "$URL"
          tar xf llvm-mingw.tar.xz
          echo "$PWD/$(ls -d llvm-mingw-*/)/bin" >> "$GITHUB_PATH"

      - name: Install mingw-w64
        if: matrix.os == 'windows' && !matrix.llvm_mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 pkg-config cmake meson ninja-build

      - name: Install build tools for llvm-mingw
        if: matrix.llvm_mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config cmake meson ninja-build autoconf automake libtool

      - name: Build dependencies
        env:
          CROSS:        ${{ matrix.cross }}
          MACOS_TARGET: ${{ matrix.macos_target }}
          PREFIX:       ${{ github.workspace }}/sysroot
        run: |
          set -e
          mkdir -p "$PREFIX"

          # ── Compiler / flag setup ──────────────────────────────────────────
          if [ -n "$MACOS_TARGET" ]; then
            CC="clang -target $MACOS_TARGET"
            CXX="clang++ -target $MACOS_TARGET"
            AR="ar"
            RANLIB="ranlib"
            STRIP="strip"
            AUTOCONF_HOST="--host=x86_64-apple-darwin"
            CMAKE_SYSTEM_NAME="Darwin"
            CMAKE_PROCESSOR="x86_64"
          elif [ -n "$CROSS" ]; then
            CC="$CROSS-gcc"
            CXX="$CROSS-g++"
            AR="$CROSS-ar"
            RANLIB="$CROSS-ranlib"
            STRIP="$CROSS-strip"
            AUTOCONF_HOST="--host=$CROSS"
            ARCH=$(echo "$CROSS" | cut -d- -f1)
            [[ "$CROSS" == *mingw* ]] && CMAKE_SYSTEM_NAME="Windows"
            CMAKE_PROCESSOR="$ARCH"
          else
            CC="cc"
            CXX="c++"
            AR="ar"
            RANLIB="ranlib"
            STRIP="strip"
            AUTOCONF_HOST=""
            CMAKE_SYSTEM_NAME="$(uname -s)"
            CMAKE_PROCESSOR="$(uname -m)"
          fi

          export CC CXX AR RANLIB STRIP
          export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
          export PKG_CONFIG_PATH=""

          if [ -n "$MACOS_TARGET" ]; then
            printf '#!/bin/sh\nexec clang -target %s "$@"\n' "$MACOS_TARGET" \
              > /tmp/cc-wrap
            printf '#!/bin/sh\nexec clang++ -target %s "$@"\n' "$MACOS_TARGET" \
              > /tmp/cxx-wrap
            chmod +x /tmp/cc-wrap /tmp/cxx-wrap
            CMAKE_CC=/tmp/cc-wrap
            CMAKE_CXX=/tmp/cxx-wrap
          else
            CMAKE_CC="$CC"
            CMAKE_CXX="$CXX"
          fi

          cat > /tmp/cross.cmake << EOF
          set(CMAKE_SYSTEM_NAME ${CMAKE_SYSTEM_NAME:-$(uname -s)})
          set(CMAKE_SYSTEM_PROCESSOR $CMAKE_PROCESSOR)
          set(CMAKE_C_COMPILER "$CMAKE_CC")
          set(CMAKE_CXX_COMPILER "$CMAKE_CXX")
          set(CMAKE_AR "$AR")
          set(CMAKE_RANLIB "$RANLIB")
          set(CMAKE_FIND_ROOT_PATH "$PREFIX")
          EOF

          # Restrict library/include search to sysroot only when cross-compiling;
          # native builds need access to system libs (e.g. libm for Leptonica)
          if [ -n "$CROSS" ] || [ -n "$MACOS_TARGET" ]; then
            cat >> /tmp/cross.cmake << EOF
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF
          fi

          AUTOCONF_FLAGS="$AUTOCONF_HOST --prefix=$PREFIX --enable-static --disable-shared"

          # ── Download pinned dependency sources from our deps release ─────
          DEPS_URL="https://github.com/${{ github.repository }}/releases/download/deps-v1"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o zlib.tar.gz    "$DEPS_URL/zlib-1.3.1.tar.gz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o ft.tar.gz      "$DEPS_URL/freetype-VER-2-13-3.tar.gz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o libpng.tar.gz  "$DEPS_URL/libpng-1.6.55.tar.gz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o fribidi.tar.xz "$DEPS_URL/fribidi-1.0.16.tar.xz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o gr2.tar.gz    "$DEPS_URL/graphite2-1.3.14.tar.gz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o icu.tgz       "$DEPS_URL/icu4c-78.2-sources.tgz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o hb.tar.xz      "$DEPS_URL/harfbuzz-10.2.0.tar.xz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o jpegturbo.tar.gz "$DEPS_URL/libjpeg-turbo-3.1.0.tar.gz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o tiff.tar.xz    "$DEPS_URL/tiff-4.7.0.tar.xz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o lept.tar.gz    "$DEPS_URL/leptonica-1.87.0.tar.gz" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o tess.tar.gz    "$DEPS_URL/tesseract-5.5.2.tar.gz" &
          wait
          tar xf zlib.tar.gz
          tar xf libpng.tar.gz
          tar xf ft.tar.gz
          tar xf fribidi.tar.xz
          tar xf gr2.tar.gz
          tar xf icu.tgz
          tar xf hb.tar.xz
          tar xf jpegturbo.tar.gz
          tar xf tiff.tar.xz
          tar xf lept.tar.gz
          tar xf tess.tar.gz

          # ── zlib ──────────────────────────────────────────────────────────
          cd zlib-1.3.1
          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
          CFLAGS="-O2" \
          ./configure --prefix="$PREFIX" --static
          make -j$(nproc) install
          cd ..

          # ── libpng (needed for color emoji glyphs in FreeType) ────────────
          cmake -S libpng-1.6.55 -B png-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DPNG_TESTS=OFF \
            -DPNG_TOOLS=OFF \
            -GNinja
          ninja -C png-build install

          # ── libjpeg-turbo (needed by libtiff and Leptonica) ────────────
          cmake -S libjpeg-turbo-3.1.0 -B jpegturbo-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_SHARED=OFF \
            -DWITH_TURBOJPEG=OFF \
            -GNinja
          ninja -C jpegturbo-build install

          # ── libtiff (needed by Leptonica) ───────────────────────────────
          cmake -S tiff-4.7.0 -B tiff-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -Dtiff-tools=OFF \
            -Dtiff-tests=OFF \
            -Dtiff-contrib=OFF \
            -Dtiff-docs=OFF \
            -Djbig=OFF \
            -Dlzma=OFF \
            -Dzstd=OFF \
            -Dwebp=OFF \
            -Dlerc=OFF \
            -GNinja
          ninja -C tiff-build install
          # Patch libtiff's CMake config: replace target references with
          # plain library flags so downstream find_package(TIFF) doesn't
          # require pre-defined ZLIB::ZLIB, JPEG::JPEG, CMath::CMath targets
          SED_I=(sed -i)
          [ "$(uname)" = "Darwin" ] && SED_I=(sed -i '')
          for f in "$PREFIX"/lib/cmake/tiff/TIFFTargets*.cmake; do
            [ -f "$f" ] || continue
            "${SED_I[@]}" \
              -e 's/\$<LINK_ONLY:ZLIB::ZLIB>/-lz/g' \
              -e 's/\$<LINK_ONLY:JPEG::JPEG>/-ljpeg/g' \
              -e 's/\$<LINK_ONLY:CMath::CMath>/-lm/g' \
              -e 's/ZLIB::ZLIB/-lz/g' \
              -e 's/JPEG::JPEG/-ljpeg/g' \
              -e 's/CMath::CMath/-lm/g' \
              "$f"
          done

          # ── freetype2 (pass 1: with zlib+png, without harfbuzz) ──────────
          cmake -S freetype-VER-2-13-3 -B ft-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_REQUIRE_ZLIB=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_REQUIRE_PNG=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON \
            -GNinja
          ninja -C ft-build install

          # ── fribidi (BiDi algorithm for RTL languages) ────────────────────
          cd fribidi-1.0.16
          CFLAGS="-O2" \
          ./configure $AUTOCONF_FLAGS --disable-docs
          make -j$(nproc) install
          cd ..

          # ── graphite2 (SIL script rendering) ──────────────────────────────
          SED_I=(sed -i)
          [ "$(uname)" = "Darwin" ] && SED_I=(sed -i '')
          "${SED_I[@]}" '/add_subdirectory(tests)/d; /add_subdirectory(gr2fonttest)/d; /enable_testing/d' \
            graphite-1.3.14/CMakeLists.txt
          "${SED_I[@]}" '/nolib_test/d' \
            graphite-1.3.14/src/CMakeLists.txt
          cmake -S graphite-1.3.14 -B gr2-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_SHARED_LIBS=OFF \
            -DGRAPHITE2_NFILEFACE=ON \
            -GNinja
          ninja -C gr2-build install

          # ── ICU (Unicode normalization for harfbuzz) ──────────────────────
          ICU_COMMON="--disable-tests --disable-samples --disable-extras --disable-icuio"
          if [ -n "$CROSS" ] || [ -n "$MACOS_TARGET" ]; then
            mkdir -p icu-native-build && cd icu-native-build
            CC=cc CXX=c++ ../icu/source/configure \
              --disable-shared --enable-static $ICU_COMMON
            make -j$(nproc)
            cd ..
            ICU_CROSS="--with-cross-build=$PWD/icu-native-build --disable-tools"
          else
            ICU_CROSS=""
          fi
          mkdir -p icu-build && cd icu-build
          ../icu/source/configure $AUTOCONF_FLAGS \
            $ICU_COMMON $ICU_CROSS
          make -j$(nproc) install
          cd ..
          for lib in "$PREFIX"/lib/libsicu*.a; do
            [ -f "$lib" ] || continue
            ln -sf "$(basename "$lib")" "${lib/libsicu/libicu}"
          done

          # ── harfbuzz (OpenType shaping) ───────────────────────────────────
          HB_ARGS=(
            --prefix="$PREFIX"
            --libdir="$PREFIX/lib"
            --default-library=static
            --pkg-config-path="$PREFIX/lib/pkgconfig"
            -Dfreetype=enabled
            -Dglib=disabled
            -Dicu=enabled
            -Dgraphite2=enabled
            -Dicu_builtin=true
            -Dtests=disabled
            -Ddocs=disabled
          )
          if [ -n "$CROSS" ] || [ -n "$MACOS_TARGET" ]; then
            if [ -n "$MACOS_TARGET" ]; then
              HB_CC="/tmp/cc-wrap"
              HB_CXX="/tmp/cxx-wrap"
              HB_SYSTEM="darwin"
              HB_CPU="x86_64"
            else
              HB_CC="$CC"
              HB_CXX="$CXX"
              ARCH=$(echo "$CROSS" | cut -d- -f1)
              HB_CPU="$ARCH"
              [[ "$CROSS" == *mingw* ]] && HB_SYSTEM="windows" || HB_SYSTEM="linux"
            fi
            cat > /tmp/hb-cross.ini << CROSSEOF
          [binaries]
          c = '$HB_CC'
          cpp = '$HB_CXX'
          ar = '$AR'
          strip = '$STRIP'
          pkg-config = 'pkg-config'

          [host_machine]
          system = '$HB_SYSTEM'
          cpu_family = '$HB_CPU'
          cpu = '$HB_CPU'
          endian = 'little'
          CROSSEOF
            HB_ARGS+=(--cross-file=/tmp/hb-cross.ini)
          fi
          if [[ "${CROSS:-}" == *mingw* ]]; then
            HB_ARGS+=(-Dcpp_args='-Wa,-mbig-obj -DGRAPHITE2_STATIC')
          fi
          meson setup hb-build harfbuzz-10.2.0 "${HB_ARGS[@]}"
          ninja -C hb-build install

          # ── freetype2 (pass 2: with harfbuzz) ────────────────────────────
          cmake -S freetype-VER-2-13-3 -B ft-build2 \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_REQUIRE_ZLIB=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_REQUIRE_PNG=ON \
            -DFT_REQUIRE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON \
            -GNinja
          ninja -C ft-build2 install

          # ── libass (pinned 0.17.4 from submodule) ─────────────────────────
          cd libass
          ./autogen.sh
          CFLAGS="-O2" \
          PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
          PKG_CONFIG_PATH="" \
          ./configure $AUTOCONF_FLAGS \
            --disable-fontconfig \
            --disable-require-system-font-provider
          make -j$(nproc) install
          cd ..

          # ── Leptonica (image processing library for Tesseract) ──────────
          cmake -S leptonica-1.87.0 -B lept-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_GIF=OFF \
            -DENABLE_WEBP=OFF \
            -DENABLE_OPENJPEG=OFF \
            -DSW_BUILD=OFF \
            -DBUILD_PROG=OFF \
            -GNinja
          ninja -C lept-build install
          # Patch Leptonica's CMake config to resolve transitive targets
          for f in "$PREFIX"/lib/cmake/leptonica/LeptonicaTargets*.cmake; do
            [ -f "$f" ] || continue
            "${SED_I[@]}" \
              -e 's/ZLIB::ZLIB/-lz/g' \
              -e 's/JPEG::JPEG/-ljpeg/g' \
              -e 's/CMath::CMath/-lm/g' \
              -e 's/TIFF::TIFF/-ltiff/g' \
              "$f"
          done

          # ── Tesseract (OCR engine) ──────────────────────────────────────
          TESS_EXTRA_FLAGS=""
          if [ -n "$CROSS" ] || [ -n "$MACOS_TARGET" ]; then
            # Tesseract's CheckFunctions.cmake uses try_run() to test
            # TIFF support; provide results to skip runtime tests
            TESS_EXTRA_FLAGS="-DLEPT_TIFF_RESULT=0 -DLEPT_TIFF_RESULT__TRYRUN_OUTPUT="
          fi
          cmake -S tesseract-5.5.2 -B tess-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            $TESS_EXTRA_FLAGS \
            -DBUILD_SHARED_LIBS=OFF \
            -DSW_BUILD=OFF \
            -DBUILD_TRAINING_TOOLS=OFF \
            -DDISABLE_ARCHIVE=ON \
            -DDISABLE_CURL=ON \
            -DOPENMP_BUILD=OFF \
            -DGRAPHICS_DISABLED=ON \
            -DDISABLED_LEGACY_ENGINE=ON \
            -GNinja
          ninja -C tess-build install

      - name: Package sysroot
        env:
          PREFIX: ${{ github.workspace }}/sysroot
        run: tar czf sysroot-${{ matrix.target }}.tar.gz -C "$PREFIX" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-${{ matrix.target }}
          path: sysroot-${{ matrix.target }}.tar.gz

  upload:
    name: Upload to release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload sysroots to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag }}
        run: |
          # Create release if it doesn't exist
          gh release view "$TAG" --repo "${{ github.repository }}" 2>/dev/null || \
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --title "Pre-built sysroots ($TAG)" \
              --notes "Pre-built static dependency sysroots for FFmpeg CI.

          Contains: zlib, libpng, libjpeg-turbo, libtiff, freetype2, fribidi, graphite2, ICU, harfbuzz, libass, leptonica, tesseract.
          Run the Build Dependencies workflow to regenerate."

          # Delete existing assets, then upload fresh ones
          for f in artifacts/sysroot-*.tar.gz; do
            name=$(basename "$f")
            gh release delete-asset "$TAG" "$name" --repo "${{ github.repository }}" --yes 2>/dev/null || true
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}"
          done
