name: FFmpeg Release

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            os: linux
            ext: ""

          - target: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            ext: ""

          # macOS x86_64: cross-compile on the M1 runner (macos-13 retired)
          - target: macos-x86_64
            runner: macos-14
            os: macos
            macos_target: x86_64-apple-macos10.14
            ext: ""

          - target: macos-arm64
            runner: macos-14
            os: macos
            ext: ""

          - target: windows-x86_64
            runner: ubuntu-24.04
            os: windows
            cross: x86_64-w64-mingw32
            ext: ".exe"

          - target: windows-arm64
            runner: ubuntu-24.04
            os: windows
            cross: aarch64-w64-mingw32
            ext: ".exe"
            llvm_mingw: true

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Install build tools ──────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config

      - name: Install macOS dependencies
        if: matrix.os == 'macos'
        run: |
          brew install pkg-config nasm coreutils

      - name: Install llvm-mingw
        if: matrix.llvm_mingw
        run: |
          URL=$(curl -fsSL https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data['assets']:
              n = a['name']
              if n.endswith('.tar.xz') and 'ucrt' in n and 'x86_64.tar.xz' in n and 'ubuntu' in n:
                  print(a['browser_download_url'])
                  break
          ")
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o llvm-mingw.tar.xz "$URL"
          tar xf llvm-mingw.tar.xz
          echo "$PWD/$(ls -d llvm-mingw-*/)/bin" >> "$GITHUB_PATH"

      - name: Install mingw-w64
        if: matrix.os == 'windows' && !matrix.llvm_mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm mingw-w64 pkg-config

      - name: Install build tools for llvm-mingw
        if: matrix.llvm_mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config

      # ── Download pre-built sysroot ───────────────────────────────────────
      - name: Download sysroot
        env:
          PREFIX: ${{ github.workspace }}/sysroot
        run: |
          SYSROOT_URL="https://github.com/${{ github.repository }}/releases/download/sysroot-v2"
          mkdir -p "$PREFIX"
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
            "$SYSROOT_URL/sysroot-${{ matrix.target }}.tar.gz" | tar xz -C "$PREFIX"

      # ── Build FFmpeg ───────────────────────────────────────────────────────
      - name: Configure FFmpeg
        working-directory: ffmpeg
        env:
          PREFIX: ${{ github.workspace }}/sysroot
        run: |
          FLAGS=(
            --disable-everything
            --enable-libass
            --enable-libtesseract
            --enable-static
            --disable-shared
            --enable-small
            --disable-debug
            --disable-doc
            --enable-ffmpeg
            --enable-ffprobe
            --disable-ffplay

            --enable-protocol=file,pipe

            # Subtitle decoders
            --enable-decoder=ass
            --enable-decoder=ssa
            --enable-decoder=subrip
            --enable-decoder=webvtt
            --enable-decoder=hdmv_pgs_subtitle
            --enable-decoder=dvb_subtitle
            --enable-decoder=dvdsub
            --enable-decoder=xsub
            --enable-decoder=mov_text
            --enable-decoder=microdvd
            --enable-decoder=jacosub
            --enable-decoder=realtext
            --enable-decoder=text

            # Subtitle encoders
            --enable-encoder=pgssub
            --enable-encoder=ass
            --enable-encoder=subrip
            --enable-encoder=webvtt
            --enable-encoder=mov_text
            --enable-encoder=dvbsub

            # Container muxers (subtitle output + -c copy)
            --enable-muxer=matroska
            --enable-muxer=mp4
            --enable-muxer=mov
            --enable-muxer=mpegts
            --enable-muxer=sup
            --enable-muxer=srt
            --enable-muxer=ass
            --enable-muxer=webvtt
            --enable-muxer=avi
            --enable-muxer=null

            # Container demuxers
            --enable-demuxer=matroska
            --enable-demuxer=mov
            --enable-demuxer=mpegts
            --enable-demuxer=sup
            --enable-demuxer=srt
            --enable-demuxer=ass
            --enable-demuxer=webvtt
            --enable-demuxer=avi

            # Parsers: bitstream framing for -c:v copy, -c:a copy
            --enable-parser=h264
            --enable-parser=hevc
            --enable-parser=av1
            --enable-parser=vp9
            --enable-parser=mpeg4video
            --enable-parser=aac
            --enable-parser=ac3
            --enable-parser=mpegaudio
            --enable-parser=vorbis
            --enable-parser=opus

            # Bitstream filters: container remuxing (e.g. mp4 → mkv)
            --enable-bsf=h264_mp4toannexb
            --enable-bsf=hevc_mp4toannexb
            --enable-bsf=aac_adtstoasc
            --enable-bsf=extract_extradata

            # Filters
            --enable-filter=subtitles
            --enable-filter=ocr
            --enable-filter=null
            --enable-filter=anull
            --enable-filter=copy
            --enable-filter=acopy
          )

          # Native build with sysroot (Linux or macOS arm64)
          if [ "${{ matrix.os }}" != "windows" ] && [ -z "${{ matrix.macos_target }}" ]; then
            EXTRA_LD="-L$PREFIX/lib"
            if [ "${{ matrix.os }}" = "linux" ]; then
              EXTRA_LD="$EXTRA_LD -static-libgcc -static-libstdc++"
              CXX_LIB="-lstdc++"
            else
              CXX_LIB="-lc++"
            fi
            FLAGS+=(
              --pkg-config-flags=--static
              --extra-cflags="-I$PREFIX/include"
              --extra-ldflags="$EXTRA_LD"
              --extra-libs="$CXX_LIB"
            )
            export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
            export PKG_CONFIG_PATH=""
          fi

          # Cross-compile: Windows
          if [ "${{ matrix.os }}" = "windows" ]; then
            ARCH=$(echo "${{ matrix.cross }}" | cut -d- -f1)
            if [ "${{ matrix.llvm_mingw }}" = "true" ]; then
              CXX_LINK="-lc++"
              EXTRA_WIN_LD="-L$PREFIX/lib -static"
            else
              CXX_LINK="-lstdc++ -static-libgcc"
              EXTRA_WIN_LD="-L$PREFIX/lib -static-libstdc++"
            fi
            FLAGS+=(
              --cross-prefix="${{ matrix.cross }}-"
              --target-os=mingw32
              --arch="$ARCH"
              --pkg-config=pkg-config
              --pkg-config-flags=--static
              --extra-cflags="-I$PREFIX/include"
              --extra-ldflags="$EXTRA_WIN_LD"
              --extra-libs="$CXX_LINK -lws2_32"
            )
            export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
            export PKG_CONFIG_PATH=""
          fi

          # Cross-compile: macOS x86_64 on M1 runner
          if [ -n "${{ matrix.macos_target }}" ]; then
            TARGET="${{ matrix.macos_target }}"
            FLAGS+=(
              --cc="clang -target $TARGET"
              --cxx="clang++ -target $TARGET"
              --arch=x86_64
              --extra-cflags="-target $TARGET -I$PREFIX/include"
              --extra-ldflags="-target $TARGET -L$PREFIX/lib"
              --extra-libs="-lc++"
              --pkg-config-flags=--static
            )
            export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
            export PKG_CONFIG_PATH=""
          fi

          ./configure "${FLAGS[@]}"

      - name: Build FFmpeg
        working-directory: ffmpeg
        run: make -j$(nproc)

      - name: Collect binaries
        run: |
          mkdir -p dist
          cp ffmpeg/ffmpeg${{ matrix.ext }}  dist/
          cp ffmpeg/ffprobe${{ matrix.ext }} dist/
          if [ "${{ matrix.os }}" = "windows" ] && [ -z "${{ matrix.llvm_mingw }}" ]; then
            DLL=$(find /usr/x86_64-w64-mingw32 -name 'libwinpthread-1.dll' 2>/dev/null | head -1)
            cp "$DLL" dist/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.target }}
          path: dist/

  # ── Attach to GitHub release ───────────────────────────────────────────────
  release:
    name: Attach to release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Download tessdata (eng)
        run: |
          TESSDATA_URL="https://github.com/${{ github.repository }}/releases/download/tessdata-v1"
          mkdir -p tessdata-eng
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
            -o tessdata-eng/eng.traineddata "$TESSDATA_URL/eng.traineddata" &
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
            -o tessdata-eng/osd.traineddata "$TESSDATA_URL/osd.traineddata" &
          wait

      - name: Package
        run: |
          for dir in artifacts/ffmpeg-*/; do
            target=$(basename "$dir")

            # -eng bundle: binaries + eng tessdata
            mkdir -p "pkg-${target}-eng/tessdata"
            cp "$dir"/* "pkg-${target}-eng/"
            cp tessdata-eng/* "pkg-${target}-eng/tessdata/"

            if [[ "$target" == *windows* ]]; then
              (cd "pkg-${target}-eng" && zip "../ffmpeg-${target}-eng.zip" -r .)
              (cd "$dir" && zip "../../ffmpeg-${target}.zip" *)
            else
              tar czf "ffmpeg-${target}-eng.tar.gz" -C "pkg-${target}-eng" .
              tar czf "ffmpeg-${target}.tar.gz" -C "$dir" .
            fi
          done

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ffmpeg-*.tar.gz
            ffmpeg-*.zip
