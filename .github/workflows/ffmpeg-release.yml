name: FFmpeg Release

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            os: linux
            ext: ""

          - target: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            ext: ""

          # macOS x86_64: cross-compile on the M1 runner (macos-13 retired)
          - target: macos-x86_64
            runner: macos-14
            os: macos
            macos_target: x86_64-apple-macos10.14
            ext: ""

          - target: macos-arm64
            runner: macos-14
            os: macos
            ext: ""

          - target: windows-x86_64
            runner: ubuntu-24.04
            os: windows
            cross: x86_64-w64-mingw32
            ext: ".exe"

          - target: windows-arm64
            runner: ubuntu-24.04
            os: windows
            cross: aarch64-w64-mingw32
            ext: ".exe"
            llvm_mingw: true

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Linux: build tools only (deps built from source below) ───────────────
      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config cmake ninja-build autoconf automake libtool

      # ── macOS: build tools (both arm64 native and x86_64 cross-compile) ──────
      - name: Install macOS dependencies
        if: matrix.os == 'macos'
        run: |
          brew install pkg-config nasm ninja autoconf automake libtool

      # ── Windows arm64: llvm-mingw ──────────────────────────────────────────
      - name: Install llvm-mingw
        if: matrix.llvm_mingw
        run: |
          # Find the Ubuntu x86_64 host package from the latest release
          URL=$(curl -fsSL https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data['assets']:
              n = a['name']
              if n.endswith('.tar.xz') and 'ucrt' in n and 'x86_64.tar.xz' in n and 'ubuntu' in n:
                  print(a['browser_download_url'])
                  break
          ")
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o llvm-mingw.tar.xz "$URL"
          tar xf llvm-mingw.tar.xz
          echo "$PWD/$(ls -d llvm-mingw-*/)/bin" >> "$GITHUB_PATH"

      # ── Windows x86_64: mingw-w64 ─────────────────────────────────────────
      - name: Install mingw-w64
        if: matrix.os == 'windows' && !matrix.llvm_mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm mingw-w64 pkg-config cmake ninja-build

      # ── Windows arm64: build tools ────────────────────────────────────────
      - name: Install build tools for llvm-mingw
        if: matrix.llvm_mingw
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config cmake ninja-build autoconf automake libtool

      # ── All targets: build full dep chain from source ─────────────────────
      # zlib → freetype2 → fribidi → harfbuzz → libass
      # Sysroot contains only .a files; host packages never leak in.
      - name: Build dependencies from source
        env:
          CROSS:        ${{ matrix.cross }}
          MACOS_TARGET: ${{ matrix.macos_target }}
          PREFIX:       ${{ github.workspace }}/sysroot
        run: |
          set -e
          mkdir -p "$PREFIX"

          # ── Compiler / flag setup ──────────────────────────────────────────
          if [ -n "$MACOS_TARGET" ]; then
            # macOS x86_64 cross-compile on M1
            CC="clang -target $MACOS_TARGET"
            CXX="clang++ -target $MACOS_TARGET"
            AR="ar"
            RANLIB="ranlib"
            STRIP="strip"
            AUTOCONF_HOST="--host=x86_64-apple-darwin"  # tell autoconf the target arch
            CMAKE_SYSTEM_NAME="Darwin"
            CMAKE_PROCESSOR="x86_64"
          elif [ -n "$CROSS" ]; then
            # Windows cross-compile
            CC="$CROSS-gcc"
            CXX="$CROSS-g++"
            AR="$CROSS-ar"
            RANLIB="$CROSS-ranlib"
            STRIP="$CROSS-strip"
            AUTOCONF_HOST="--host=$CROSS"
            ARCH=$(echo "$CROSS" | cut -d- -f1)
            if [[ "$CROSS" == *mingw* ]]; then
              CMAKE_SYSTEM_NAME="Windows"
            fi
            CMAKE_PROCESSOR="$ARCH"
          else
            # Native build (Linux or macOS arm64)
            CC="cc"
            CXX="c++"
            AR="ar"
            RANLIB="ranlib"
            STRIP="strip"
            AUTOCONF_HOST=""
            CMAKE_SYSTEM_NAME="$(uname -s)"
            CMAKE_PROCESSOR="$(uname -m)"
          fi

          export CC CXX AR RANLIB STRIP
          export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
          export PKG_CONFIG_PATH=""

          # CMake requires CMAKE_C_COMPILER to be a bare path (no spaces).
          # For macOS cross-compile, wrap the compiler+target flag in a script.
          if [ -n "$MACOS_TARGET" ]; then
            printf '#!/bin/sh\nexec clang -target %s "$@"\n' "$MACOS_TARGET" \
              > /tmp/cc-wrap
            printf '#!/bin/sh\nexec clang++ -target %s "$@"\n' "$MACOS_TARGET" \
              > /tmp/cxx-wrap
            chmod +x /tmp/cc-wrap /tmp/cxx-wrap
            CMAKE_CC=/tmp/cc-wrap
            CMAKE_CXX=/tmp/cxx-wrap
          else
            CMAKE_CC="$CC"
            CMAKE_CXX="$CXX"
          fi

          # ── CMake toolchain file ───────────────────────────────────────────
          cat > /tmp/cross.cmake << EOF
          set(CMAKE_SYSTEM_NAME ${CMAKE_SYSTEM_NAME:-$(uname -s)})
          set(CMAKE_SYSTEM_PROCESSOR $CMAKE_PROCESSOR)
          set(CMAKE_C_COMPILER "$CMAKE_CC")
          set(CMAKE_CXX_COMPILER "$CMAKE_CXX")
          set(CMAKE_AR "$AR")
          set(CMAKE_RANLIB "$RANLIB")
          set(CMAKE_FIND_ROOT_PATH "$PREFIX")
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

          AUTOCONF_FLAGS="$AUTOCONF_HOST --prefix=$PREFIX --enable-static --disable-shared"

          # ── Windows: seed sysroot with static winpthread ───────────────────
          # All pkg-config .pc files (libass, harfbuzz, freetype) list
          # -lwinpthread in Libs.private. Placing libwinpthread.a in $PREFIX/lib
          # (the first -L path) means every -lwinpthread in the final link
          # resolves to the static copy, not the DLL import library.
          if [ -n "$CROSS" ]; then
            cp "/usr/$CROSS/lib/libwinpthread.a" "$PREFIX/lib/"
          fi

          # ── zlib ──────────────────────────────────────────────────────────
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o zlib.tar.gz \
            https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz
          tar xf zlib.tar.gz
          cd zlib-1.3.1
          # zlib uses a non-autoconf configure; set CC explicitly
          CC="$CC" AR="$AR" RANLIB="$RANLIB" \
          CFLAGS="-O2" \
          ./configure --prefix="$PREFIX" --static
          make -j$(nproc) install
          cd ..

          # ── freetype2 (full: with zlib, without harfbuzz initially) ───────
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o ft.tar.gz \
            https://github.com/freetype/freetype/archive/refs/tags/VER-2-13-3.tar.gz
          tar xf ft.tar.gz
          cmake -S freetype-VER-2-13-3 -B ft-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_REQUIRE_ZLIB=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON \
            -GNinja
          ninja -C ft-build install

          # ── fribidi (BiDi algorithm for RTL languages) ────────────────────
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o fribidi.tar.xz \
            https://github.com/fribidi/fribidi/releases/download/v1.0.16/fribidi-1.0.16.tar.xz
          tar xf fribidi.tar.xz
          cd fribidi-1.0.16
          CFLAGS="-O2" \
          ./configure $AUTOCONF_FLAGS --disable-docs
          make -j$(nproc) install
          cd ..

          # ── harfbuzz (OpenType shaping: Arabic, Devanagari, CJK, etc.) ────
          # Uses CMake (autotools removed in 3.x)
          curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o hb.tar.xz \
            https://github.com/harfbuzz/harfbuzz/releases/download/10.2.0/harfbuzz-10.2.0.tar.xz
          tar xf hb.tar.xz
          # Windows: harfbuzz.cc amalgamation exceeds default COFF section limit
          HB_EXTRA=()
          [[ "${CROSS:-}" == *mingw* ]] && HB_EXTRA+=(-DCMAKE_CXX_FLAGS=-Wa,-mbig-obj)

          cmake -S harfbuzz-10.2.0 -B hb-build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            "${HB_EXTRA[@]}" \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DHB_HAVE_FREETYPE=ON \
            -DHB_HAVE_GLIB=OFF \
            -DHB_HAVE_ICU=OFF \
            -DHB_HAVE_GRAPHITE2=OFF \
            -DHB_BUILD_SUBSET=OFF \
            -DHB_BUILD_TESTS=OFF \
            -DHB_BUILD_DOCS=OFF \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_FIND_ROOT_PATH="$PREFIX" \
            -GNinja
          ninja -C hb-build install

          # ── freetype2 rebuild with harfbuzz (color glyphs, OTL features) ──
          cmake -S freetype-VER-2-13-3 -B ft-build2 \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/cross.cmake \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_REQUIRE_ZLIB=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_REQUIRE_HARFBUZZ=ON \
            -DFT_DISABLE_BROTLI=ON \
            -GNinja
          ninja -C ft-build2 install

          # ── libass (pinned 0.17.4 from submodule) ─────────────────────────
          cd libass
          ./autogen.sh
          CFLAGS="-O2" \
          PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig" \
          PKG_CONFIG_PATH="" \
          ./configure $AUTOCONF_FLAGS \
            --disable-fontconfig \
            --disable-require-system-font-provider
          make -j$(nproc) install
          cd ..

      # ── Build FFmpeg ───────────────────────────────────────────────────────
      - name: Configure FFmpeg
        working-directory: ffmpeg
        env:
          PREFIX: ${{ github.workspace }}/sysroot
        run: |
          FLAGS=(
            --disable-everything
            --enable-libass
            --enable-static
            --disable-shared
            --enable-small
            --disable-debug
            --disable-doc
            --enable-ffmpeg
            --enable-ffprobe
            --disable-ffplay

            --enable-protocol=file,pipe

            # Subtitle decoders
            --enable-decoder=ass
            --enable-decoder=ssa
            --enable-decoder=subrip
            --enable-decoder=webvtt
            --enable-decoder=hdmv_pgs_subtitle
            --enable-decoder=dvb_subtitle
            --enable-decoder=dvdsub
            --enable-decoder=xsub
            --enable-decoder=mov_text
            --enable-decoder=microdvd
            --enable-decoder=jacosub
            --enable-decoder=realtext
            --enable-decoder=text

            # Subtitle encoders
            --enable-encoder=pgssub
            --enable-encoder=ass
            --enable-encoder=subrip
            --enable-encoder=webvtt
            --enable-encoder=mov_text
            --enable-encoder=dvbsub

            # Container muxers (subtitle output + -c copy)
            --enable-muxer=matroska
            --enable-muxer=mp4
            --enable-muxer=mov
            --enable-muxer=mpegts
            --enable-muxer=sup
            --enable-muxer=srt
            --enable-muxer=ass
            --enable-muxer=webvtt
            --enable-muxer=avi
            --enable-muxer=null

            # Container demuxers
            --enable-demuxer=matroska
            --enable-demuxer=mov
            --enable-demuxer=mpegts
            --enable-demuxer=sup
            --enable-demuxer=srt
            --enable-demuxer=ass
            --enable-demuxer=webvtt
            --enable-demuxer=avi

            # Parsers: bitstream framing for -c:v copy, -c:a copy
            --enable-parser=h264
            --enable-parser=hevc
            --enable-parser=av1
            --enable-parser=vp9
            --enable-parser=mpeg4video
            --enable-parser=aac
            --enable-parser=ac3
            --enable-parser=mpegaudio
            --enable-parser=vorbis
            --enable-parser=opus

            # Bitstream filters: container remuxing (e.g. mp4 → mkv)
            --enable-bsf=h264_mp4toannexb
            --enable-bsf=hevc_mp4toannexb
            --enable-bsf=aac_adtstoasc
            --enable-bsf=extract_extradata

            # Filters
            --enable-filter=subtitles
            --enable-filter=null
            --enable-filter=anull
            --enable-filter=copy
            --enable-filter=acopy
          )

          # Native build with sysroot (Linux or macOS arm64)
          if [ "${{ matrix.os }}" != "windows" ] && [ -z "${{ matrix.macos_target }}" ]; then
            # Linux: statically link GCC + C++ runtimes so libgcc_s.so and
            # libstdc++.so don't leak in (harfbuzz brings C++ object files).
            # macOS uses Clang; libc++.dylib is a guaranteed system library.
            EXTRA_LD="-L$PREFIX/lib"
            [ "${{ matrix.os }}" = "linux" ] && EXTRA_LD="$EXTRA_LD -static-libgcc -static-libstdc++"
            FLAGS+=(
              --pkg-config-flags=--static
              --extra-cflags="-I$PREFIX/include"
              --extra-ldflags="$EXTRA_LD"
            )
            export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
            export PKG_CONFIG_PATH=""
          fi

          # Cross-compile: Windows
          if [ "${{ matrix.os }}" = "windows" ]; then
            ARCH=$(echo "${{ matrix.cross }}" | cut -d- -f1)
            FLAGS+=(
              --cross-prefix="${{ matrix.cross }}-"
              --target-os=mingw32
              --arch="$ARCH"
              --pkg-config=pkg-config
              --pkg-config-flags=--static
              --extra-cflags="-I$PREFIX/include"
              --extra-ldflags="-L$PREFIX/lib -static-libgcc"
            )
            export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
            export PKG_CONFIG_PATH=""
          fi

          # Cross-compile: macOS x86_64 on M1 runner
          if [ -n "${{ matrix.macos_target }}" ]; then
            TARGET="${{ matrix.macos_target }}"
            FLAGS+=(
              --cc="clang -target $TARGET"
              --cxx="clang++ -target $TARGET"
              --arch=x86_64
              --extra-cflags="-target $TARGET -I$PREFIX/include"
              --extra-ldflags="-target $TARGET -L$PREFIX/lib"
              --pkg-config-flags=--static
            )
            export PKG_CONFIG_LIBDIR="$PREFIX/lib/pkgconfig"
            export PKG_CONFIG_PATH=""
          fi

          ./configure "${FLAGS[@]}"

      - name: Build FFmpeg
        working-directory: ffmpeg
        run: make -j$(nproc)

      - name: Collect binaries
        run: |
          mkdir -p dist
          cp ffmpeg/ffmpeg${{ matrix.ext }}  dist/
          cp ffmpeg/ffprobe${{ matrix.ext }} dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.target }}
          path: dist/

  # ── Attach to GitHub release ───────────────────────────────────────────────
  release:
    name: Attach to release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Package
        run: |
          cd artifacts
          for dir in */; do
            target="${dir%/}"
            cd "$dir"
            if [[ "$target" == *windows* ]]; then
              zip "../../ffmpeg-${target}.zip" *
            else
              tar czf "../../ffmpeg-${target}.tar.gz" *
            fi
            cd ..
          done
          cd ..

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ffmpeg-*.tar.gz
            ffmpeg-*.zip
